<<!DOCTYPE html>
<html>
<head>
  <title>Pedido</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { 
      font-family: Arial; 
      padding: 15px; 
      background: #f5f5f5; 
    }

    h2 { 
      text-align: center; 
      margin-bottom: 20px;
    }

    input, textarea { 
      padding: 10px; 
      font-size: 16px; 
      box-sizing: border-box; 
      border-radius: 6px;
      border: 1px solid #ccc;
      width: 100%;
    }

    .linha { 
      display: flex; 
      gap: 10px; 
      margin-bottom: 10px; 
      flex-wrap: wrap; 
    }

    .linha .campo { 
      flex: 1; 
      min-width: 140px;
    }

    /* PRODUTOS */
    .produto { 
      background: white; 
      padding: 12px; 
      margin-bottom: 12px; 
      border-radius: 10px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .produto-topo {
      margin-bottom: 8px;
    }

    .produto-topo b {
      font-size: 14px;
    }

    .produto-topo label {
      font-size: 12px;
      display: block;
      margin-top: 4px;
    }

    .produto-topo input[type="number"] {
      width: 120px;
      margin-top: 6px;
    }

    .direita { 
      display: flex; 
      align-items: center; 
      gap: 10px; 
      margin-top: 10px; 
    }

    .qtd { 
      width: 70px; 
      text-align: center;
    }

    .valorItem { 
      flex: 1;
      font-weight: bold; 
      color: green; 
      text-align: right;
      font-size: 16px;
    }

    .total { 
      font-size: 22px; 
      font-weight: bold; 
      text-align: center; 
      margin-top: 20px; 
    }

    button { 
      width: 100%; 
      padding: 15px; 
      background: green; 
      color: white; 
      font-size: 18px; 
      border: none; 
      border-radius: 10px; 
      margin-top: 10px;
    }

    textarea { 
      resize: vertical; 
      min-height: 60px; 
      margin-top: 6px; 
    }

    /* MOBILE AJUSTE FINO */
    @media (max-width: 600px) {
      .linha {
        flex-direction: column;
      }

      .direita {
        justify-content: space-between;
      }

      .valorItem {
        font-size: 18px;
      }

      button {
        font-size: 16px;
      }
    }

  </style>
</head>

<body>

<h2>Pedido</h2>

<div class="linha">
  <input class="campo" id="cliente" placeholder="Nome/Razão Social do Cliente">
  <input class="campo" id="doc" placeholder="CPF/CNPJ" oninput="formatarDocumento(this)">
</div>

<div class="linha">
  <input class="campo" id="vendedor" placeholder="Nome do vendedor">
  <input class="campo" id="cidade" placeholder="Cidade">
</div>

<div class="linha">
  <input class="campo" id="data" type="date" placeholder="Data do Pedido">
  <input class="campo" id="pagamento" placeholder="Forma de Pagamento">
</div>

<h3>Produtos</h3>
<div id="produtos"></div>

<textarea id="observacoes" placeholder="Observações gerais (opcional)"></textarea>

<div class="total">
  Total: <span id="total">R$ 0,00</span>
</div>

<button onclick="enviarPedido()">FINALIZAR PEDIDO</button>
<button onclick="limparPedido()" style="background:#888;">
  LIMPAR PEDIDO
</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  { codigo: "85", nome: "Vela 5F CX 24x8 (7898269580370)", preco: 2.99 },

const produtosComCampoExtra = ["17","37","15","55","67","68","90"];

function formatarDocumento(campo) {
  let valor = campo.value.replace(/\D/g, '');
  if (valor.length <= 11) { 
    valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
    valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
    valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
  } else { 
    valor = valor.replace(/^(\d{2})(\d)/, '$1.$2');
    valor = valor.replace(/^(\d{2}\.\d{3})(\d)/, '$1.$2');
    valor = valor.replace(/^(\d{2}\.\d{3}\.\d{3})(\d)/, '$1/$2');
    valor = valor.replace(/(\d{4})(\d{1,2})$/, '$1-$2');
  }
  campo.value = valor;
}

function formatarMoeda(valor) {
  return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function togglePreco(i) {
  const campo = document.getElementById(`preco_${i}`);
  campo.disabled = !campo.disabled;
}

function limparPedido() {
  if (!confirm("Tem certeza que deseja limpar o pedido?")) return;

  // Campos principais
  document.getElementById("cliente").value = "";
  document.getElementById("doc").value = "";
  document.getElementById("vendedor").value = "";
  document.getElementById("cidade").value = "";
  document.getElementById("data").value = "";
  document.getElementById("pagamento").value = "";
  document.getElementById("observacoes").value = "";

  // Produtos
  listaProdutos.forEach((p, i) => {
    document.getElementById(`qtd_${i}`).value = 0;
    document.getElementById(`valor_${i}`).innerText = "R$ 0,00";

    const campoObs = document.getElementById(`obs_${i}`);
    if (campoObs) campoObs.value = "";
  });

  // Total
  document.getElementById("total").innerText = "R$ 0,00";
}

function renderProdutos() {
  const div = document.getElementById("produtos");
  div.innerHTML = "";
  listaProdutos.forEach((p, i) => {
    const campoExtra = produtosComCampoExtra.includes(p.codigo)
      ? `<textarea placeholder="Informações adicionais" id="obs_${i}"></textarea>`
      : "";
    div.innerHTML += `
      <div class="produto">
        <div>
  <b>${p.codigo}</b> - ${p.nome}<br>

  <label style="font-size:12px;">
    <input type="checkbox" onchange="togglePreco(${i})"> Alterar preço
  </label><br>

 <div style="display:flex; align-items:center; background:#f1f1f1; padding:5px 8px; border-radius:6px; width:120px; margin-top:4px;">
  <span style="font-size:14px;">R$</span>
  <input 
    type="number" 
    id="preco_${i}" 
    value="${p.preco}" 
    step="0.01"
    disabled
    style="border:none; background:transparent; width:100%;"
    onchange="calcularTotal()"
  >
</div>

  ${campoExtra}
</div>
        <div class="direita">
          <input class="qtd" type="number" min="0" value="0" onchange="calcularTotal()" id="qtd_${i}">
          <span class="valorItem" id="valor_${i}">R$ 0,00</span>
        </div>
      </div>
    `;
  });
}

function calcularTotal() {
  let total = 0;
  listaProdutos.forEach((p, i) => {
    const qtd = Number(document.getElementById(`qtd_${i}`).value);
    const preco = Number(document.getElementById(`preco_${i}`).value);
    const totalItem = qtd * preco;
    document.getElementById(`valor_${i}`).innerText = formatarMoeda(totalItem);
    total += totalItem;
  });
  document.getElementById("total").innerText = formatarMoeda(total);
}

function preencherDataHoje() {
  const hoje = new Date();

  const ano = hoje.getFullYear();
  const mes = String(hoje.getMonth() + 1).padStart(2, '0');
  const dia = String(hoje.getDate()).padStart(2, '0');

  // Formato que o input date entende (YYYY-MM-DD)
  const dataFormatada = `${ano}-${mes}-${dia}`;

  document.getElementById("data").value = dataFormatada;
}

  doc.line(10, 35, 200, 35);

  doc.text(`CPF/CNPJ: ${pedido.doc}`, 10, 52);
  doc.text(`Vendedor: ${pedido.vendedor}`, 10, 59);
  doc.text(`Cidade: ${pedido.cidade}`, 10, 66);
  doc.text(`Pagamento: ${pedido.pagamento}`, 10, 73);

  doc.setFontSize(12);
  doc.text("Itens", 10, y);

  y += 6;
  doc.setFontSize(10);

  pedido.itens.forEach(item => {
    doc.text(`${item.qtd}x`, 10, y);
    doc.text(item.nome, 20, y);
    doc.text(formatarMoeda(item.preco * item.qtd), 200, y, { align: "right" });

    y += 5;

    if (item.obsExtra && item.obsExtra.trim() !== "") {
      doc.setFontSize(9);
      doc.text(`Obs: ${item.obsExtra}`, 20, y);
      doc.setFontSize(10);

    }

    // quebra de página automática
    if (y > 270) {
      doc.addPage();
      y = 20;
    }
  });

  // ===== TOTAL =====
  y += 10;
  doc.setFontSize(12);
  doc.setFont(undefined, "bold");

  const total = pedido.itens.reduce((acc, i) => acc + i.preco * i.qtd, 0);
  doc.text(`Total: ${formatarMoeda(total)}`, 200, y, { align: "right" });

  doc.setFont(undefined, "normal");

  // ===== OBSERVAÇÕES =====
  if (pedido.observacoes) {
    y += 10;
    doc.setFontSize(10);
    doc.text("Observações:", 10, y);
    y += 5;
    doc.text(pedido.observacoes, 10, y);
  }

  // ===== SALVAR =====
  doc.save(`Pedido_${pedido.cliente}.pdf`);

    const observacoes = document.getElementById("observacoes").value;

    const itens = [];

    itens.push({
      codigo:p.codigo,
      nome:p.nome,
      qtd,
      preco,
      obsExtra
    });
      }
    });

    if(itens.length===0){alert("Selecione pelo menos um produto."); return;}
